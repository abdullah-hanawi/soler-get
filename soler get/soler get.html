<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLER GET - حلول الطاقة الشمسية المتكاملة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* إعدادات المتغيرات اللونية الفاخرة بالطابع البترولي والذهبي والمينت */
        :root {
            --petroleum: #134e5e;       /* اللون البترولي الأساسي العاصف والأنيق */
            --petroleum-light: #1c6a7f; /* درجة بترولية أفتح للتأثيرات والتفاعلات */
            --gold: #f39c12;            /* اللون الفرعي الأول: الذهبي الشمسي */
            --mint: #2ecc71;            /* اللون الفرعي الثاني: الأخضر المينت النقي للبيئة */
            --dark-bg: #0b2228;         /* خلفية داكنة مشتقة من البترولي الداكن جداً */
            --light-bg: #f4f8f9;        /* خلفية فاتحة مريحة جداً للعين مائلة للبياض البترولي */
            --text-dark: #2c3e50;
            --text-light: #fff;
            --gray-text: #7f8c8d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .container {
            width: 88%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* شريط التنقل (Header) */
        header {
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(19, 78, 94, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo a {
            font-size: 26px;
            font-weight: 900;
            color: var(--petroleum);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo a span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 15px;
        }

        .nav-links li a.nav-item {
            text-decoration: none;
            color: var(--petroleum);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-links li a.nav-item:hover,
        .nav-links li a.nav-item.active {
            color: var(--gold);
            background-color: rgba(19, 78, 94, 0.05);
        }

        .btn-nav {
            background-color: var(--petroleum);
            color: #fff !important;
            border-radius: 5px;
        }

        .btn-nav:hover {
            background-color: var(--gold) !important;
            color: var(--dark-bg) !important;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            color: var(--petroleum);
            cursor: pointer;
        }

        /* الواجهة الرئيسية (Hero Section) */
        .hero-section {
            background: linear-gradient(135deg, rgba(19, 78, 94, 0.95), rgba(11, 34, 40, 0.9)),
                        url('https://images.unsplash.com/photo-1509391366360-2e959784a276?auto=format&fit=crop&w=1200&q=80') center center/cover;
            padding: 90px 0;
            color: var(--text-light);
        }

        .hero-wrapper {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            align-items: center;
            gap: 40px;
        }

        .hero-content .badge {
            background-color: rgba(243, 156, 18, 0.2);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }

        .hero-content h1 {
            font-size: 42px;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 35px;
            text-align: justify;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-main {
            background-color: var(--gold);
            color: var(--dark-bg);
            padding: 14px 28px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        .btn-main:hover {
            background-color: var(--mint);
            color: var(--dark-bg);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }

        .btn-sub {
            border: 2px solid #fff;
            color: #fff;
            padding: 12px 26px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn-sub:hover {
            background-color: #fff;
            color: var(--petroleum);
        }

        .hero-image-box img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.1);
        }

        /* قسم الإحصائيات البارز */
        .stats-section {
            background-color: #fff;
            padding: 40px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: relative;
            margin-top: -30px;
            border-radius: 10px;
            z-index: 10;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
        }

        .stat-item h3 {
            font-size: 32px;
            color: var(--petroleum);
            font-weight: 700;
        }

        .stat-item p {
            color: var(--gray-text);
            font-size: 14px;
            margin-top: 5px;
        }

        /* قسم من نحن (About) */
        .about-section {
            padding: 80px 0;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 0.9fr 1.1fr;
            gap: 50px;
            align-items: center;
        }

        .about-img-gallery img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(19, 78, 94, 0.15);
        }

        .sub-title {
            color: var(--mint);
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 10px;
        }

        .about-text h2 {
            font-size: 34px;
            color: var(--petroleum);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .bullet-points {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .point {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .icon-box {
            background-color: rgba(46, 204, 113, 0.1);
            color: var(--mint);
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .point h4 {
            color: var(--petroleum);
            margin-bottom: 5px;
            font-size: 18px;
        }

        .point p {
            color: var(--gray-text);
            font-size: 14px;
        }

        /* الخدمات (Services) */
        .services-section {
            background-color: #ebf3f5;
            padding: 80px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 34px;
            color: var(--petroleum);
            margin-top: 5px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .service-card {
            background-color: #fff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-bottom-color: var(--gold);
            box-shadow: 0 12px 30px rgba(19, 78, 94, 0.1);
        }

        .card-icon {
            font-size: 40px;
            color: var(--petroleum);
            margin-bottom: 20px;
        }

        .service-card h3 {
            font-size: 20px;
            color: var(--petroleum);
            margin-bottom: 12px;
        }

        .service-card p {
            color: var(--gray-text);
            font-size: 15px;
            text-align: justify;
        }

        /* المنتجات والمعدات */
        .products-section {
            padding: 80px 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .product-box {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
        }

        .prod-img img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .prod-info {
            padding: 25px;
        }

        .prod-brand {
            color: var(--mint);
            font-size: 13px;
            font-weight: 700;
        }

        .prod-info h3 {
            font-size: 20px;
            color: var(--petroleum);
            margin: 8px 0;
        }

        .prod-info p {
